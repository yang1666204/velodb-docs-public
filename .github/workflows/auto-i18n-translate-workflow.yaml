name: Auto Translate Docs (EN -> JA)

on:
  push:

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.diff.outputs.files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: diff
        name: Detect changed English docs
        run: |
          BASE=${{ github.event.before }}
          HEAD=${{ github.sha }}
          git diff --name-only "$BASE" "$HEAD" \
            | grep -E '^(enterprise_versioned_docs|cloud_versioned_docs)/.*\.mdx?$' > changed.txt || true
          echo "files=$(jq -R -s -c 'split("\n")[:-1]' changed.txt)" >> $GITHUB_OUTPUT

      - name: Debug outputs
        run: |
          echo "files output is:"
          echo '${{ steps.diff.outputs.files }}'

  prepare_translation_input:
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.files != '[]'
    outputs:
      manifest: ${{ steps.prepare.outputs.manifest }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
            node-version: 20     

      - name: Test AWS API Access
        env:
          AWS_API_KEY: ${{ secrets.AWS_API_KEY }}
        run: |
          echo "Testing AWS API Access..."
          node scripts/i18n/test-aws-access.js

      - name: Install dependencies
        run: | 
          npm install -g yarn 
          yarn install --frozen-lockfile

      - id: prepare
        name: Prepare translation input
        run: |
          mkdir -p .i18n/input
          echo '${{ needs.detect_changes.outputs.files }}' > files.json
          node scripts/i18n/prepare.js files.json .i18n/input manifest.json
          echo "manifest=$(cat manifest.json | jq -c '.')" >> $GITHUB_OUTPUT
      
      - name: Debug:list .i18n/input
        run: |
          echo "Contents of .i18n/input:"
          ls -la .i18n/input || true
          echo "File count: $(find .i18n/input -type f | wc -l)"

      - name: Verify intermediate files exist
        run: |
          COUNT=$(find .i18n/input -type f | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No intermediate files generated in .i18n/input"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: i18n-input
          path: .i18n/input

  translate_docs:
    runs-on: ubuntu-latest
    needs: prepare_translation_input
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          name: i18n-input
          path: .i18n/input

      - name: Translate via Claude API
        env:
          AWS_API_KEY: ${{ secrets.AWS_API_KEY }}
        run: |
          mkdir -p .i18n/output
          node scripts/i18n/translate-claude.js \
            .i18n/input \
            .i18n/output

      - uses: actions/upload-artifact@v4
        with:
          name: i18n-output
          path: .i18n/output

# post_process 写入了 markdown
  post_process:
    runs-on: ubuntu-latest
    needs: translate_docs
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
            node-version: 20     

      - name: Install dependencies
        run: | 
          npm install -g yarn 
          yarn install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          name: i18n-output
          path: .i18n/output

      - name: Restore markdown and write ja docs
        run: |
          node scripts/i18n/post-process.js \
            .i18n/output \
            i18n/ja/docusaurus-plugin-content-docs-enterprise/version-2.1


      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add i18n/ja
          git commit -m "chore(i18n): auto translate docs to ja" || echo "No changes"

  create_pr:
    runs-on: ubuntu-latest
    needs: post_process
    permissions:
      contents: write
      pull-requests: write
    steps:
      # 1. checkout 仓库
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 下载翻译产物
      - uses: actions/download-artifact@v4
        with:
          name: i18n-output
          path: .i18n/output
          include-hidden-files: true

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
            node-version: 20     

      - name: Install dependencies
        run: | 
          npm install -g yarn 
          yarn install --frozen-lockfile

      - name: Restore markdown and write ja docs
        run: |
          node scripts/i18n/post-process.js \
            .i18n/output \
            i18n/ja/docusaurus-plugin-content-docs-enterprise/version-2.1

      # 4. 创建 PR
      - uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: auto/i18n-ja-${{ github.run_id }}
          commit-message: chore(i18n):auto translate docs to ja
          title: "[auto-i18n] Translate docs to Japanese"
          body: |
            This PR contains automatically translated Japanese docs.
          add-paths: |
            cloud_versioned_docs/**
            enterprise_versioned_docs/**
            i18n/ja/**
            docs/**
